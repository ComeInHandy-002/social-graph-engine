name: C++ 引擎跨平台自动化构建

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: 构建于 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    # 🌟 告诉云端服务器：进到 backend_cpp 文件夹里去配置
    - name: 配置 CMake
      working-directory: ./backend_cpp
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    # 🌟 告诉云端服务器：进到 backend_cpp 文件夹里去编译
    - name: 执行编译
      working-directory: ./backend_cpp
      run: cmake --build build --config Release

    # 🌟 Linux 环境测试路径
    - name: 运行单元测试 (Linux)
      if: matrix.os == 'ubuntu-latest'
      working-directory: ./backend_cpp/build
      run: ./graph_engine run_test

    # 🌟 Windows 环境测试路径
    - name: 运行单元测试 (Windows)
      if: matrix.os == 'windows-latest'
      working-directory: ./backend_cpp/build
      run: .\Release\graph_engine.exe run_test